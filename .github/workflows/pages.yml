name: Deploy Pages

on:
  workflow_run:
    workflows: [Release]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - run: pip install -r requirements.txt

      - run: python sources/build.py

      - name: Stage site
        run: |
          set -euo pipefail
          mkdir -p _site
          cp dev/preview.html _site/index.html
          touch _site/.nojekyll
          cp -r fonts _site/fonts

          # Rewrite the two @font-face srcs from "../fonts/..." (dev path) to
          # "fonts/..." (relative to _site/index.html). The in-page code-example
          # block at ~line 445 has no "../" prefix and is left untouched.
          sed -i 's|\.\./fonts/|fonts/|g' _site/index.html

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
