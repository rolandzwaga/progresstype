name: Deploy Pages

on:
  workflow_run:
    workflows: [Release]
    types: [completed]
  push:
    branches: [main]
    paths:
      - dev/preview.html
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Stage site
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p _site/fonts
          cp dev/preview.html _site/index.html
          touch _site/.nojekyll

          # Pull the two woff2 files preview.html needs from the latest release.
          gh release download --repo "$GITHUB_REPOSITORY" \
            --pattern 'ProgressType-Regular.woff2' \
            --pattern 'ProgressType-VF.woff2' \
            --dir _site/fonts/

          # Rewrite the two @font-face srcs to point at the flat release-asset
          # filenames now staged under fonts/. The in-page code-example block at
          # ~line 455 has no "../" prefix and is left untouched.
          sed -i \
            -e 's|\.\./fonts/webfonts/ProgressType-Regular\.woff2|fonts/ProgressType-Regular.woff2|' \
            -e 's|\.\./fonts/variable/ProgressType\[RADI,wdth,wght\]\.woff2|fonts/ProgressType-VF.woff2|' \
            _site/index.html

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
