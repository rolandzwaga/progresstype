name: Deploy Pages

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Stage site
        env:
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir -p _site
          cp dev/preview.html _site/index.html
          touch _site/.nojekyll

          base="https://github.com/${REPO}/releases/latest/download"
          # Rewrite the two @font-face srcs (regular static + variable).
          # The in-page code-example block at ~line 445 is left as-is.
          sed -i \
            -e "s|\.\./fonts/webfonts/ProgressType-Regular\.woff2|${base}/ProgressType-Regular.woff2|" \
            -e "s|\.\./fonts/variable/ProgressType\[wdth,wght\]\.woff2|${base}/ProgressType-VF.woff2|" \
            _site/index.html

      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0

      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
