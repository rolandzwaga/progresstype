name: Deploy Pages

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Stage site
        env:
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir -p _site
          cp dev/preview.html _site/index.html
          touch _site/.nojekyll

          base="https://github.com/${REPO}/releases/latest/download"
          # Rewrite the two @font-face srcs (regular static + variable).
          # The in-page code-example block at ~line 445 is left as-is.
          sed -i \
            -e "s|\.\./fonts/webfonts/ProgressType-Regular\.woff2|${base}/ProgressType-Regular.woff2|" \
            -e "s|\.\./fonts/variable/ProgressType\[wdth,wght\]\.woff2|${base}/ProgressType-VF.woff2|" \
            _site/index.html

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
