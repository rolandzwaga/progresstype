name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - run: pip install -r requirements.txt

      - run: python sources/build.py

      - name: Stage release assets
        run: |
          set -euo pipefail
          mkdir -p release-assets
          # Static instances (TTF + WOFF2).
          cp fonts/ttf/*.ttf release-assets/
          cp fonts/webfonts/*.woff2 release-assets/
          # Variable font: copy to friendlier names (GitHub mangles [ ] , in asset names).
          cp "fonts/variable/ProgressType[wdth,wght].ttf"   release-assets/ProgressType-VF.ttf
          cp "fonts/variable/ProgressType[wdth,wght].woff2" release-assets/ProgressType-VF.woff2
          # Also bundle the entire fonts/ tree as a zip for convenience.
          ( cd fonts && zip -r "../release-assets/ProgressType-${TAG}.zip" . )
          ls -la release-assets/
        env:
          TAG: ${{ github.event.release.tag_name }}

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
        run: gh release upload "$TAG" release-assets/* --clobber --repo "$GITHUB_REPOSITORY"
