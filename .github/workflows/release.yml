name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - run: pip install -r requirements.txt

      - run: python sources/build.py

      - name: Stage release assets
        run: |
          set -euo pipefail
          mkdir -p release-assets
          # Static instances (TTF + WOFF2).
          cp fonts/ttf/*.ttf release-assets/
          cp fonts/webfonts/*.woff2 release-assets/
          # Variable font: copy to friendlier names (GitHub mangles [ ] , in asset names).
          cp "fonts/variable/ProgressType[wdth,wght].ttf"   release-assets/ProgressType-VF.ttf
          cp "fonts/variable/ProgressType[wdth,wght].woff2" release-assets/ProgressType-VF.woff2
          # Also bundle the entire fonts/ tree as a zip for convenience.
          ( cd fonts && zip -r "../release-assets/ProgressType-${TAG}.zip" . )
          ls -la release-assets/
        env:
          TAG: ${{ github.event.release.tag_name }}

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
        run: gh release upload "$TAG" release-assets/* --clobber --repo "$GITHUB_REPOSITORY"
